name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write # cosign keyless signing reads OIDC tokens

env:
  # goreleaser-cross ships pinned cross toolchains: osxcross (with the
  # macOS SDK) for darwin, llvm-mingw for windows, glibc/musl for linux.
  # The version is bumped manually so the image stays in sync with the
  # goreleaser version it bundles; the tag must match a published image
  # at ghcr.io/goreleaser/goreleaser-cross.
  # Versioning scheme is `vGOVERSION-N` (Go toolchain version, not the
  # bundled goreleaser version). v1.26.2-3 ships go1.26.2; close enough
  # to the project's go.mod (go 1.26) — Go is backward compatible
  # within a minor.
  GORELEASER_CROSS_VERSION: v1.26.2-3

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    outputs:
      # base64-encoded sha256sum-format digest list, consumed by the
      # SLSA provenance job below. goreleaser already produces this
      # exact format in dist/checksums.txt — we just base64 it.
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # We run goreleaser inside the goreleaser-cross container rather
      # than via goreleaser-action so the cross toolchains needed for
      # CGO builds (tree-sitter in pkg/lang/rust) are available without
      # per-OS native runners. The container has goreleaser, cosign,
      # upx, and every cross compiler pre-installed.
      - name: Run goreleaser inside goreleaser-cross
        run: |
          docker run --rm \
            -v "$PWD":/build -w /build \
            -e GITHUB_TOKEN \
            -e HOMEBREW_TAP_TOKEN \
            -e ACTIONS_ID_TOKEN_REQUEST_URL \
            -e ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            ghcr.io/goreleaser/goreleaser-cross:${GORELEASER_CROSS_VERSION} \
            release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo PAT with contents:write on thesm-os/homebrew-tap;
          # goreleaser's homebrew_casks block uses it to bump the cask
          # file on every non-prerelease tag.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Compute artifact digests for SLSA provenance
        id: hash
        # The SLSA generic generator expects `sha256sum`-format lines
        # ("<hex> <name>\n"), base64-encoded with no wrapping. That's
        # exactly the layout of goreleaser's checksums.txt.
        run: |
          cd dist
          echo "hashes=$(base64 -w0 < checksums.txt)" >> "$GITHUB_OUTPUT"

  # SLSA Build L3 provenance attestation. Runs on a GitHub-hosted
  # runner (not in our container) because the reusable workflow needs
  # direct access to the actions runtime / OIDC token for signing.
  # Output is `multiple.intoto.jsonl`, attached to the release; users
  # verify with `slsa-verifier verify-artifact`.
  provenance:
    needs: [goreleaser]
    permissions:
      actions: read       # read the workflow run that built the artifacts
      id-token: write     # mint the OIDC token used to sign the attestation
      contents: write     # upload the attestation to the release
    # MUST be pinned to a full `vX.Y.Z` tag — slsa-verifier refuses to
    # verify attestations produced by float / commit refs.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.goreleaser.outputs.hashes }}"
      upload-assets: true
