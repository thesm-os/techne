name: Release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write       # cosign keyless signing + attestation OIDC
  attestations: write   # actions/attest-build-provenance writes the SLSA attestation

env:
  # goreleaser-cross ships pinned cross toolchains: osxcross (with the
  # macOS SDK) for darwin, llvm-mingw for windows, glibc/musl for linux.
  # The version is bumped manually so the image stays in sync with the
  # goreleaser version it bundles; the tag must match a published image
  # at ghcr.io/goreleaser/goreleaser-cross.
  # Versioning scheme is `vGOVERSION-N` (Go toolchain version, not the
  # bundled goreleaser version). v1.26.2-3 ships go1.26.2; close enough
  # to the project's go.mod (go 1.26) — Go is backward compatible
  # within a minor.
  GORELEASER_CROSS_VERSION: v1.26.2-3

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      # We run goreleaser inside the goreleaser-cross container rather
      # than via goreleaser-action so the cross toolchains needed for
      # CGO builds (tree-sitter in pkg/lang/rust) are available without
      # per-OS native runners. The container has goreleaser, cosign,
      # upx, and every cross compiler pre-installed.
      - name: Run goreleaser inside goreleaser-cross
        run: |
          docker run --rm \
            -v "$PWD":/build -w /build \
            -e GITHUB_TOKEN \
            -e HOMEBREW_TAP_TOKEN \
            -e ACTIONS_ID_TOKEN_REQUEST_URL \
            -e ACTIONS_ID_TOKEN_REQUEST_TOKEN \
            ghcr.io/goreleaser/goreleaser-cross:${GORELEASER_CROSS_VERSION} \
            release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Cross-repo PAT with contents:write on thesm-os/homebrew-tap;
          # goreleaser's homebrew_casks block uses it to bump the cask
          # file on every non-prerelease tag.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      # SLSA Build L3 provenance attestation. Stored in GitHub's
      # attestation API (not attached to the release), so it works
      # even when the repo has "Immutable releases" enabled — the
      # release itself isn't modified after creation. Users verify
      # with `gh attestation verify --owner thesm-os <file>` or
      # `slsa-verifier verify-artifact` against the downloaded
      # attestation bundle.
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          # Attest both the archives AND the raw per-target binaries
          # under dist/<id>_<goos>_<goarch>[_<variant>]/. Including the
          # binaries lets users verify the installed file directly
          # (e.g. /opt/homebrew/Caskroom/techne/<ver>/techne) without
          # having to re-download the archive.
          subject-path: |
            dist/*.tar.gz
            dist/*.zip
            dist/**/techne
            dist/**/techne.exe
